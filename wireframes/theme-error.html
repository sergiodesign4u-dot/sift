<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sift - Wireframe 4.0 Theme detail (error)</title>
<link rel="stylesheet" href="_wf.css">
</head>
<!--
  Wireframe 4.0 Theme detail - error (could not load the theme). State of node 4.0.
  Two visible exits: retry (to the loading state) or back to Synthesis. Never a dead end.
  A single unresolvable evidence item is handled by 5.1, not here (ia/docs/pages/theme.md).
-->
<body>

<div id="wf-topbar" data-node="4.0" data-state="error"></div>

<div class="wf-shell">
  <div id="wf-rail" data-node="4.0" data-state="error"></div>

  <div class="wf-stage">
    <div class="wf-canvas">
      <div class="wf-app">

        <div data-wf="header" data-active="synthesis"></div>

        <nav class="wf-breadcrumb" aria-label="Breadcrumb"><a href="synthesis.html">Synthesis</a> &rsaquo; <span>Theme</span></nav>

        <main class="wf-main">
          <div class="wf-state">
            <div class="wf-state-ic"></div>
            <h1 class="wf-state-t">Could not load this theme</h1>
            <div class="wf-state-d">The evidence for this theme did not come back this time. Nothing is lost. Try again, or go back to the ranked themes.</div>
            <div class="wf-state-actions">
              <a class="wf-btn--ghost" href="synthesis.html">Back to Synthesis</a>
              <a class="wf-btn" href="theme-loading.html">Try again</a>
            </div>
          </div>
        </main>

        <div data-wf="appfoot"></div>
        <div data-wf="bottomtabs" data-active="synthesis"></div>

      </div>
    </div>
  </div>
</div>

<script src="_nav.js"></script>
</body>
</html>
