<div class="wf-shell">

  <div class="wf-stage">

        <div data-wf="header" data-active="synthesis"></div>

            <div class="wf-state-actions">
              <a class="wf-btn" href="connect.html">Connect a source</a>
            </div>
          </div>
        </main>

        <div data-wf="appfoot"></div>
        <div data-wf="bottomtabs" data-active="synthesis"></div>

      </div>
    </div>
  </div>
