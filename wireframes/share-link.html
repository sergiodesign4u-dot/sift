<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sift - Wireframe 6.3 Share-link generated</title>
<link rel="stylesheet" href="_wf.css">
</head>
<!--
  Wireframe 6.3 Brief: share-link generated (success). The public link, a copy action, and the
  access note (no login to view). Reached after the brief is built. Leads to the public preview
  (6.4). Text from ia/docs/pages/briefs.md.
-->
<body>

<div id="wf-topbar" data-node="6.3" data-state="base"></div>

<div class="wf-shell">
  <div id="wf-rail" data-node="6.3" data-state="base"></div>

  <div class="wf-stage">
    <div class="wf-canvas">
      <div class="wf-app">

        <div data-wf="header" data-active="briefs"></div>

        <main class="wf-main">
          <div class="wf-dialog">
            <h1>Share link ready</h1>
            <p>Anyone with this link can read the brief. No login needed to view, and the data is PII scrubbed like everywhere else.</p>
            <div class="wf-linkrow">
              <input class="wf-input" type="text" value="https://sift.app/b/7fq2-k9xa" readonly aria-label="Public brief link">
              <button class="wf-btn">Copy</button>
            </div>
            <div class="wf-theme-headactions">
              <a class="wf-btn--ghost" href="briefs.html">Done</a>
              <a class="wf-btn" href="shared-brief.html">Preview brief</a>
            </div>
          </div>
        </main>

        <div data-wf="appfoot"></div>
        <div data-wf="bottomtabs" data-active="briefs"></div>

      </div>
    </div>
  </div>
</div>

<script src="_nav.js"></script>
</body>
</html>
