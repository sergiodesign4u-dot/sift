<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sift - Wireframe 2.2 Synthesis loading</title>
<link rel="stylesheet" href="_wf.css">
</head>
<!--
  Wireframe 2.2 Synthesis: loading / synthesizing. State of node 2.0.
  Skeleton theme cards while ingest and cluster run. An honest wait, not a bare spinner.
  Transitions to the populated success on completion. Text from ia/docs/pages/synthesis.md.
-->
<body>

<div id="wf-topbar" data-node="2.0" data-state="loading"></div>

<div class="wf-shell">
  <div id="wf-rail" data-node="2.0" data-state="loading"></div>

  <div class="wf-stage">
    <div class="wf-canvas">
      <div class="wf-app">

        <div data-wf="header" data-active="synthesis"></div>

        <main class="wf-main">
          <div class="wf-main-head">
            <h1 class="wf-h1">Synthesis</h1>
            <p class="wf-sub">Synthesizing your feedback. Ingesting, scrubbing PII, and clustering into themes.</p>
          </div>
          <ul class="wf-list" aria-busy="true">
            <li class="wf-skelcard"><div class="wf-skel a"></div><div class="wf-skel b"></div></li>
            <li class="wf-skelcard"><div class="wf-skel c"></div><div class="wf-skel b"></div></li>
            <li class="wf-skelcard"><div class="wf-skel a"></div><div class="wf-skel b"></div></li>
            <li class="wf-skelcard"><div class="wf-skel c"></div><div class="wf-skel b"></div></li>
            <li class="wf-skelcard"><div class="wf-skel a"></div><div class="wf-skel b"></div></li>
          </ul>
        </main>

        <div data-wf="appfoot"></div>
        <div data-wf="bottomtabs" data-active="synthesis"></div>

      </div>
    </div>
  </div>
</div>

<script src="_nav.js"></script>
</body>
</html>
