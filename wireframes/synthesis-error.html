<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sift - Wireframe 2.3 Synthesis error</title>
<link rel="stylesheet" href="_wf.css">
</head>
<!--
  Wireframe 2.3 Synthesis: error. State of node 2.0.
  Synthesis failed. Two visible exits: retry (to the loading state) or go to Sources (3.0).
  Never a dead end. Text from ia/docs/pages/synthesis.md (states).
-->
<body>

<div id="wf-topbar" data-node="2.0" data-state="error"></div>

<div class="wf-shell">
  <div id="wf-rail" data-node="2.0" data-state="error"></div>

  <div class="wf-stage">
    <div class="wf-canvas">
      <div class="wf-app">

        <div data-wf="header" data-active="synthesis"></div>

        <main class="wf-main">
          <div class="wf-state">
            <div class="wf-state-ic"></div>
            <h1 class="wf-state-t">Synthesis failed</h1>
            <div class="wf-state-d">We could not build the picture this time. Your sources are still connected, so nothing is lost. Try again, or check your sources.</div>
            <div class="wf-state-actions">
              <a class="wf-btn--ghost" href="sources.html">Go to Sources</a>
              <a class="wf-btn" href="synthesis-loading.html">Retry</a>
            </div>
          </div>
        </main>

        <div data-wf="appfoot"></div>
        <div data-wf="bottomtabs" data-active="synthesis"></div>

      </div>
    </div>
  </div>
</div>

<script src="_nav.js"></script>
</body>
</html>
